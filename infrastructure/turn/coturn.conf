# XPARQ Coturn baseline configuration
# Dynamic values such as realm, shared secret, external IP, and relay ports
# are supplied by docker-compose command flags and environment variables.

fingerprint
lt-cred-mech
use-auth-secret

# Real-world mobile networks often require TCP and TLS relay fallback.
listening-ip=0.0.0.0
relay-ip=0.0.0.0
listening-port=3478
tls-listening-port=5349

# Security hardening
no-cli
no-loopback-peers
no-multicast-peers
stale-nonce=600
check-origin-consistency

# Mobile handoff and roaming friendliness
mobility

# Relay policy
no-tcp-relay=0
min-port=49160
max-port=49200

# Logging
simple-log
log-file=stdout

# TLS policy
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem
no-tlsv1
no-tlsv1_1

# Quotas
user-quota=12
total-quota=1200
