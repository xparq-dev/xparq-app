version: "3.9"

services:
  coturn:
    image: coturn/coturn:4.6.2
    container_name: xparq-coturn
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./coturn.conf:/etc/coturn/turnserver.conf:ro
      - ${TURN_TLS_CERT_DIR}:/etc/coturn/certs:ro
      - coturn-data:/var/lib/coturn
    command:
      - -c
      - /etc/coturn/turnserver.conf
      - --realm=${TURN_REALM}
      - --external-ip=${TURN_EXTERNAL_IP}
      - --listening-ip=${TURN_LISTEN_IP}
      - --relay-ip=${TURN_RELAY_IP}
      - --static-auth-secret=${TURN_SHARED_SECRET}
      - --listening-port=${TURN_PORT}
      - --tls-listening-port=${TURN_TLS_PORT}
      - --min-port=${TURN_MIN_PORT}
      - --max-port=${TURN_MAX_PORT}
      - --cert=/etc/coturn/certs/${TURN_TLS_CERT_FILE}
      - --pkey=/etc/coturn/certs/${TURN_TLS_KEY_FILE}

volumes:
  coturn-data:
