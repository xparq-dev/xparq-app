<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPARQ Screen Mirroring Client</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
        }
        
        .container {
            max-width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .control-group label {
            font-size: 12px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .control-group input, .control-group select {
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .status {
            padding: 10px 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status.connected {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
            color: #4CAF50;
        }
        
        .status.disconnected {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
        }
        
        .status.connecting {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #FFC107;
            color: #FFC107;
        }
        
        .screen-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
        }
        
        #screenCanvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        .placeholder {
            text-align: center;
            color: #666;
            font-size: 18px;
        }
        
        .stats {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            color: #0f0;
        }
        
        .error {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(244, 67, 54, 0.9);
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            max-width: 300px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Screen Mirroring Client</h1>
            <div class="controls">
                <div class="control-group">
                    <label for="host">Host</label>
                    <input type="text" id="host" value="localhost" placeholder="Device IP">
                </div>
                <div class="control-group">
                    <label for="port">Port</label>
                    <input type="number" id="port" value="8080" placeholder="Port">
                </div>
                <div class="control-group">
                    <label for="scale">Scale</label>
                    <select id="scale">
                        <option value="0.5">50%</option>
                        <option value="0.75">75%</option>
                        <option value="1" selected>100%</option>
                        <option value="1.25">125%</option>
                        <option value="1.5">150%</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>&nbsp;</label>
                    <button id="connectBtn" class="btn btn-primary">Connect</button>
                </div>
                <div class="control-group">
                    <label>&nbsp;</label>
                    <button id="disconnectBtn" class="btn btn-danger" disabled>Disconnect</button>
                </div>
            </div>
            <div id="status" class="status disconnected">Disconnected</div>
        </div>
        
        <div class="screen-container">
            <canvas id="screenCanvas" style="display: none;"></canvas>
            <div id="placeholder" class="placeholder">
                <p>Connect to a device to start screen mirroring</p>
                <p style="font-size: 14px; margin-top: 10px;">Make sure the device is running the screen mirroring service</p>
            </div>
            <div id="stats" class="stats" style="display: none;">
                <div>FPS: <span id="fps">0</span></div>
                <div>Frames: <span id="frameCount">0</span></div>
                <div>Size: <span id="frameSize">0x0</span></div>
            </div>
        </div>
    </div>

    <script>
        class ScreenMirroringClient {
            constructor() {
                this.ws = null;
                this.canvas = document.getElementById('screenCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.frameCount = 0;
                this.lastFrameTime = Date.now();
                this.fps = 0;
                
                this.initializeEventListeners();
            }
            
            initializeEventListeners() {
                document.getElementById('connectBtn').addEventListener('click', () => this.connect());
                document.getElementById('disconnectBtn').addEventListener('click', () => this.disconnect());
                document.getElementById('scale').addEventListener('change', () => this.updateScale());
            }
            
            connect() {
                const host = document.getElementById('host').value;
                const port = document.getElementById('port').value;
                
                this.updateStatus('connecting', 'Connecting...');
                this.disableControls(true);
                
                // Create WebSocket connection
                const wsUrl = `ws://${host}:${port}`;
                this.ws = new WebSocket(wsUrl);
                
                this.ws.onopen = () => {
                    this.updateStatus('connected', 'Connected');
                    this.disableControls(false);
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('screenCanvas').style.display = 'block';
                    document.getElementById('stats').style.display = 'block';
                };
                
                this.ws.onmessage = (event) => {
                    this.handleMessage(event.data);
                };
                
                this.ws.onclose = () => {
                    this.updateStatus('disconnected', 'Disconnected');
                    this.disableControls(false);
                    this.showPlaceholder();
                };
                
                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.showError('Connection error. Check if the device is running and the port is correct.');
                    this.updateStatus('disconnected', 'Connection Error');
                    this.disableControls(false);
                };
            }
            
            disconnect() {
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
            }
            
            handleMessage(data) {
                try {
                    if (data.startsWith('FRAME:')) {
                        const base64Data = data.substring(6); // Remove 'FRAME:' prefix
                        this.displayFrame(base64Data);
                    }
                } catch (error) {
                    console.error('Error handling message:', error);
                    this.showError('Error processing frame data');
                }
            }
            
            displayFrame(base64Data) {
                const img = new Image();
                img.onload = () => {
                    // Update canvas dimensions if needed
                    if (this.canvas.width !== img.width || this.canvas.height !== img.height) {
                        this.canvas.width = img.width;
                        this.canvas.height = img.height;
                        document.getElementById('frameSize').textContent = `${img.width}x${img.height}`;
                    }
                    
                    // Clear and draw image
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.drawImage(img, 0, 0);
                    
                    // Update stats
                    this.updateStats();
                };
                img.onerror = (error) => {
                    console.error('Error loading image:', error);
                    this.showError('Error displaying frame');
                };
                img.src = `data:image/png;base64,${base64Data}`;
            }
            
            updateStats() {
                this.frameCount++;
                const now = Date.now();
                const delta = now - this.lastFrameTime;
                
                if (delta >= 1000) {
                    this.fps = Math.round((this.frameCount * 1000) / delta);
                    document.getElementById('fps').textContent = this.fps;
                    document.getElementById('frameCount').textContent = this.frameCount;
                    this.frameCount = 0;
                    this.lastFrameTime = now;
                }
            }
            
            updateScale() {
                const scale = parseFloat(document.getElementById('scale').value);
                this.canvas.style.transform = `scale(${scale})`;
            }
            
            updateStatus(type, message) {
                const statusEl = document.getElementById('status');
                statusEl.className = `status ${type}`;
                statusEl.textContent = message;
            }
            
            disableControls(disabled) {
                document.getElementById('connectBtn').disabled = disabled;
                document.getElementById('disconnectBtn').disabled = !disabled;
                document.getElementById('host').disabled = disabled;
                document.getElementById('port').disabled = disabled;
            }
            
            showPlaceholder() {
                document.getElementById('placeholder').style.display = 'block';
                document.getElementById('screenCanvas').style.display = 'none';
                document.getElementById('stats').style.display = 'none';
            }
            
            showError(message) {
                const errorEl = document.createElement('div');
                errorEl.className = 'error';
                errorEl.textContent = message;
                document.querySelector('.screen-container').appendChild(errorEl);
                
                setTimeout(() => {
                    errorEl.remove();
                }, 5000);
            }
        }
        
        // Initialize client when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new ScreenMirroringClient();
        });
    </script>
</body>
</html>
