name: xparq_app
description: "XPARQ - Safe Galactic Social"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  ffmpeg_kit_flutter_new_min: ^3.0.2  # Community-maintained replacement for retired ffmpeg_kit_flutter_min
  # Supabase
  supabase_flutter: ^2.8.3

  # Firebase (for Push Notifications via FCM)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utilities
  connectivity_plus: ^6.1.1
  flutter_background_service: ^5.0.10
  timeago: ^3.7.0
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  go_router: ^14.8.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  sensors_plus: ^6.1.1
  mobile_scanner: ^6.0.0
  photo_manager: ^3.3.0
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  video_player: ^2.9.1
  cryptography: ^2.5.0
  dargon2_flutter: ^3.3.0
  dio: ^5.8.0

  # Radar / Location
  geolocator: ^13.0.2
  flutter_native_splash: ^2.4.7
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.4.2
  photo_manager_image_provider: ^2.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  local_auth: ^2.3.0
  google_fonts: ^8.0.2
  nearby_connections: ^4.3.0
  flutter_local_notifications: ^18.0.1
  camera: ^0.12.0
  native_device_orientation: ^2.1.0
  share_plus: ^12.0.1
  gal: ^2.3.2
  path: ^1.9.1
  liboqs: ^1.2.0
  vector_math: ^2.1.4

  http: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3
  freezed: ^3.1.0
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4


flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/launcher_icon_full.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/launcher_icon_full.png"
  min_sdk_android: 21

