global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: xparq-signaling
    metrics_path: /metrics
    static_configs:
      - targets:
          - signaling-us-east-1.internal:3000
          - signaling-eu-west-1.internal:3000
          - signaling-ap-southeast-1.internal:3000

  - job_name: xparq-redis-exporter
    static_configs:
      - targets:
          - redis-exporter.internal:9121
